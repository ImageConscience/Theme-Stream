# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "3f5bfc4ab3e08d0a20f721cb45e7cdea"
name = "Theme Stream"
application_url = "https://theme-stream-production.up.railway.app/app/theme-stream"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-01"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_content,read_files,read_metaobject_definitions,read_metaobjects,unauthenticated_read_metaobjects,write_content,write_files,write_metaobject_definitions,write_metaobjects,write_products"
optional_scopes = [ ]
use_legacy_install_flow = false

[metaobjects.app.theme_stream_position]
name = "Theme Stream Position"
access.admin = "merchant_read_write"
access.storefront = "public_read"

[metaobjects.app.theme_stream_position.fields.name]
name = "Name"
type = "single_line_text_field"

[metaobjects.app.theme_stream_position.fields.description]
name = "Description"
type = "multi_line_text_field"

[auth]
redirect_urls = [
  "https://theme-stream-production.up.railway.app/auth",
  "https://theme-stream-production.up.railway.app/auth/callback"
]
